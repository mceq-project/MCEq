name: Test

on:
  pull_request:
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - CMakeLists.txt
      - .github/workflows/test.yaml
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      UV_SYSTEM_PYTHON: "true"
    strategy:
      matrix:
        include:
          - os: windows-latest
            python-version: "3.12"
            installs: "mkl numpy>=2 scipy matplotlib"

          - os: macos-14
            python-version: "3.12"
            installs: ""

          - os: ubuntu-latest
            python-version: "3.13"
            installs: "mkl"
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: False
        fetch-depth: 3
    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ matrix.os }}-${{ matrix.python-version }}
    - uses: astral-sh/setup-uv@v7
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install requirements
      run: uv pip install -e . --group test ${{ matrix.installs }}
    - name: Check MKL version
      if: runner.os != 'macOS'
      run: pip show mkl
    - name: Cache test database
      uses: actions/cache@v5
      with:
        path: src/MCEq/data/mceq_db_v140reduced_compact.h5
        key: mceq-test-db-v1-${{ runner.os }}

    - name: Download test database if not cached
      shell: bash
      run: |
        if [ ! -f "src/MCEq/data/mceq_db_v140reduced_compact.h5" ]; then
          curl -L https://github.com/mceq-project/MCEq/releases/download/ci-assets/mceq_db_v140reduced_compact.h5 -o src/MCEq/data/mceq_db_v140reduced_compact.h5
        fi
    - name: Run tests
      run: pytest --cov=MCEq --cov-branch --cov-report=xml -n 3
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: ${{ matrix.os }}
